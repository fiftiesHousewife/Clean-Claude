tool-summary=    <div class="tool-summary">\n      <h2>Sources</h2>\n      <table>\n        <tr><th>Tool</th><th>Findings</th></tr>\n{toolRows}      </table>\n    </div>\n
tool-row=        <tr><td>{tool}</td><td>{count}</td></tr>\n
code-group=    <details>\n      <summary><span class="code-label">{codeName}</span>{heuristicName} ({count})</summary>\n      <div class="group-body">\n{reference}{guidance}        <table>\n          <tr><th>Severity</th><th>Location</th><th>Message</th></tr>\n{findingRows}        </table>\n      </div>\n    </details>\n
optional-paragraph=        <p class="{cssClass}">{text}</p>\n
finding-row=          <tr><td class="{severityClass}">{severityName}</td><td class="location">{locationHtml}</td><td>{message}</td></tr>\n
location-link=<a href="{url}">{label}</a>
