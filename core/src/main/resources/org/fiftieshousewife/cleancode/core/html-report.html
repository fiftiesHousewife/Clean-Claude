<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Code Report — {projectName}</title>
  <style>
{styles}  </style>
</head>
<body>
  <header>
    <h1>Clean Code Analysis</h1>
    <p>{projectHeading}</p>
  </header>
  <main>
    <div class="summary">
      <span class="badge error">{errorCount} errors</span>
      <span class="badge warning">{warningCount} warnings</span>
      <span class="badge info">{infoCount} info</span>
    </div>
{body}  </main>
  <footer>
    <p>Generated by Clean Code Plugin &mdash; {timestamp}</p>
    <p>{totalFindings} total findings</p>
  </footer>
</body>
</html>
