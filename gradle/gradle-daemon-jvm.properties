#
# Gradle 8.5+ daemon JVM criteria. The Clean Code plugin's OpenRewrite
# finding source uses rewrite-java-21, which references internal javac
# classes (e.g. com.sun.tools.javac.code.Type$UnknownType) whose
# layout changed in JDK 25. Pinning the daemon to JDK 21 keeps
# OpenRewrite parsing working until we move the whole build to JDK 25
# (tracked as urgent backlog item — see docs/plan-next-session.md).
#
toolchainVersion=21
